name: Results (gem5 virtual prototype)

# Builds gem5 with the accelerator compiled in (make gem5) inside the dev
# container — which ships the gem5 source tree at /opt/gem5 — runs the ARM64
# driver over TLM (make run-vp), verifies output_gem5.raw against BT.601, and
# commits the simulation log + output image into README.md as github-actions[bot].
#
# Runs on pull requests that touch the virtual prototype, so the result shows up
# as a check on the PR, plus workflow_dispatch for manual reruns on any branch.
#
# The paths filter is what makes a per-PR run affordable: the first scons build
# of gem5 is ~30-60 min (reruns are much faster thanks to the cached build/
# directory), so it is deliberately kept off PRs that cannot affect it -- docs,
# the HLS kernel, the scripts. Note the trade-off: because of the filter this
# workflow must NOT be marked a required status check, since GitHub leaves a
# required check pending forever on PRs where the filter skips it.
#
# The src/ restructure broke this build (a stale include in accelerator_wrapper.hh)
# and nothing caught it, because build.yml only checks the gem5 config's Python
# syntax and never compiles gem5 -- hence putting it on the PR path.

on:
  pull_request:
    paths:
      - "src/gem5/**"
      - "src/model/**"
      - "src/common/**"
      - "src/program/**"
      - ".devcontainer/**"
      - "Makefile"
      - ".github/workflows/results-gem5.yml"
  workflow_dispatch:
    inputs:
      ref:
        description: Branch to run on and commit results to
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  # On pull_request, github.ref_name is "<PR#>/merge" rather than the branch, so
  # the head ref is what identifies the work here and in the checkout/push below.
  group: results-gem5-${{ github.event.inputs.ref || github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: false

jobs:
  gem5:
    name: Build gem5 + run the virtual prototype
    runs-on: ubuntu-latest
    timeout-minutes: 120
    # Advisory, non-blocking check. The ~50-min gem5 build is heavy and the
    # results in the README are produced and verified locally in the dev
    # container, so a failure here (or the job not finishing) must never block a
    # merge. It still runs and reports, but its outcome does not gate the PR.
    continue-on-error: true
    if: github.actor != 'github-actions[bot]'
    env:
      # The branch to run on and commit results to. On pull_request the default
      # checkout is a detached merge commit and github.ref_name is "<PR#>/merge",
      # neither of which can be pushed back to -- the head branch is what we want.
      TARGET_REF: ${{ github.event.inputs.ref || github.event.pull_request.head.ref || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_REF }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build the dev container (gem5 source + toolchain)
        uses: docker/build-push-action@v6
        with:
          context: .devcontainer
          file: .devcontainer/Dockerfile
          load: true
          tags: vitis-hls-accel:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # gem5's scons output. Mounted over /opt/gem5/build so an incremental
      # rebuild on the next run only recompiles what changed.
      - name: Cache the gem5 build
        uses: actions/cache@v4
        with:
          path: .gem5-build
          key: gem5-build-${{ hashFiles('src/gem5/**', 'src/model/**', 'src/common/**') }}
          restore-keys: |
            gem5-build-

      - name: Build gem5 and run the virtual prototype
        run: |
          mkdir -p .gem5-build images/output
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -v "${{ github.workspace }}/.gem5-build:/opt/gem5/build" \
            -w /workspace \
            vitis-hls-accel:ci \
            bash -c '
              # pipefail matters here: both piped steps below would otherwise
              # report only the exit status of tee, so a failing make run-vp --
              # or, worse, a check_output.py that finds a BT.601 mismatch --
              # would pass silently and the results would still be committed.
              set -eo pipefail
              make gem5
              make run-vp | tee gem5.log
              python3 scripts/check_output.py | tee check.log
              python3 scripts/generate_results.py gem5 --run-log gem5.log --check-log check.log
            '

      - name: Take ownership of container-written files
        run: sudo chown -R "$USER" README.md gem5.log check.log || true

      - name: Commit gem5 results to the branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "No result changes to commit"
          else
            git commit -m "ci: update gem5 virtual prototype results"
            git push origin HEAD:"$TARGET_REF"
          fi
